services:
  postgres:
    image: postgres:16-alpine
    container_name: feiracontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feiracontrol}
      POSTGRES_USER: ${POSTGRES_USER:-feiracontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feiracontrol}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feiracontrol} -d ${POSTGRES_DB:-feiracontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
