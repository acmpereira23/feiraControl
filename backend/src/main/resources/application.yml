server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: feiracontrol-backend
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:feiracontrol}
    username: ${POSTGRES_USER:feiracontrol}
    password: ${POSTGRES_PASSWORD:feiracontrol}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.feiracontrol.backend: INFO

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:feiracontrol-dev-secret-key-with-32-bytes}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
